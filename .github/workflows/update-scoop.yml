name: Update Scoop Bucket

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to process (e.g., v1.22.0)"
        required: true
        default: "v1.22.0"

permissions:
  contents: write
  actions: read

jobs:
  update-bucket:
    name: Update Scoop Bucket
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scoop-bucket
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: yotoplay/scoop-bucket
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: scoop-bucket

      - name: Checkout twine-to-yoto (for scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: yotoplay/twine-to-yoto
          path: twine-to-yoto

      - name: Resolve release tag
        id: resolve_tag
        run: |
          echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT

      - name: Generate Scoop manifest
        run: |
          cd scoop-bucket

          RELEASE_TAG="${{ steps.resolve_tag.outputs.tag }}"
          echo "Using release tag: $RELEASE_TAG"

          ../twine-to-yoto/scripts/generate-scoop-manifest.sh "$RELEASE_TAG"

          cat twine2yoto.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add twine2yoto.json
          git status

          if git diff --cached --quiet; then
            echo "Manifest is already up to date, nothing to commit"
          else
            git commit -m "feat: update twine2yoto to $RELEASE_TAG"
            git remote set-url origin https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/yotoplay/scoop-bucket.git
            git push origin main
          fi
